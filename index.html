<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 600px;
            margin-top: 40px;
        }
        .chat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .message {
            margin: 10px 0;
        }
        .user {
            text-align: right;
            color: blue;
        }
        .ai {
            text-align: left;
            color: green;
        }
        .input-area {
            margin-top: 10px;
            display: flex;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
        }
        .loader {
            font-style: italic;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Medical Chat 🧠</h2>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input id="question" placeholder="Ask something..." />
        <button onclick="askAI()">Send</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function askAI() {
    const input = document.getElementById("question");
    const question = input.value;
    if (!question) return;

    addMessage("You: " + question, "user");
    input.value = "";

    const loader = document.createElement("div");
    loader.className = "message ai loader";
    loader.innerText = "AI is typing...";
    chat.appendChild(loader);

    const res = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ question })
    });

    const data = await res.json();

    chat.removeChild(loader);
    addMessage("AI: " + data.answer, "ai");
}
</script>

</body>
</html>
